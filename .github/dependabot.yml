version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
    groups:
      patch-updates:
        update-types:
          - "patch"

  - package-ecosystem: "pip"
    directory: "/voice-engine"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"

  - package-ecosystem: "gradle"
    directory: "/backend"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"

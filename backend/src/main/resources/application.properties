# HTTP
quarkus.http.port=${BACKEND_PORT:8080}

# gRPC client (voice-engine)
quarkus.grpc.clients.voice-engine.host=${VOICE_ENGINE_HOST:localhost}
quarkus.grpc.clients.voice-engine.port=${VOICE_ENGINE_PORT:50051}

# Database
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/pos_voice_concierge}
quarkus.datasource.username=${DATABASE_USER:postgres}
quarkus.datasource.password=${DATABASE_PASSWORD:}
quarkus.hibernate-orm.database.generation=none
quarkus.flyway.migrate-at-start=true

# API Key authentication
pos-voice.api-key=${POS_VOICE_API_KEY:}

# Security: health endpoint is public, all /api/** require authentication
quarkus.http.auth.permission.public.paths=/health
quarkus.http.auth.permission.public.policy=permit
quarkus.http.auth.permission.api.paths=/api/*
quarkus.http.auth.permission.api.policy=authenticated
